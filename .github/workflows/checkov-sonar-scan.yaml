name: Checkov and SonarQube Scan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'modules/**'
  push:
    branches:
      - main
    paths:
      - 'modules/**'
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  id-token: write
  security-events: write
  pull-requests: read

jobs:
  checkov_scan:
    name: Checkov SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov SAST Scan
        uses: UKHomeOffice/core-cloud-workflow-checkov-sast-scan@1.7.0
        with:
          path: modules

  sonarqube_scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: checkov_scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write sonar-project.properties
        run: |
          cat > sonar-project.properties << 'EOF'
          sonar.projectKey=core-cloud-appstream2-terraform
          sonar.projectName=CC AppStream TF Modules
          sonar.sources=modules
          sonar.exclusions=**/.terragrunt-cache/**,**/outputs/**,**/*.tfplan
          sonar.qualitygate.wait=false
          sonar.issues.fail=false
          sonar.scm.provider=git
          EOF

          echo "Generated sonar-project.properties:"
          cat sonar-project.properties

      - name: SonarQube Scan
        uses: UKHomeOffice/core-cloud-workflow-sonarqube-scan@1.1.4
        with:
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          sonar_host_url: ${{ secrets.SONAR_HOST_URL }}
